spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration/common

security:
  jwt:
    secret: ${JWT_SECRET}
    expiration: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,info
