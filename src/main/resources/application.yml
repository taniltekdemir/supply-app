spring:
  application:
    name: supply-app

  datasource:
    url: jdbc:postgresql://localhost:5432/supplydb
    username: supply
    password: supply123

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: public

  flyway:
    enabled: true
    schemas: public
    locations: classpath:db/migration/common

  data:
    redis:
      host: localhost
      port: 6379

security:
  jwt:
    secret: ${JWT_SECRET:local-dev-secret-change-in-production}
    expiration: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,info